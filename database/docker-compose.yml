services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    env_file:
      - .env                                 # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    volumes:
      - ./data:/var/lib/postgresql/data      # Persistent storage for the database files
      - ./initdb:/docker-entrypoint-initdb.d:ro # SQL scripts run once on first init
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    depends_on:
      - postgres
    ports:
      - "2222:8080"                          # Expose Adminer on port 2222 → 8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres       # Default server = the Postgres container name

# Notes:
# 1. Adminer waits for Postgres via `depends_on` and is reachable at http://localhost:2222.
# 2. Set POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB in this directory's .env.
# 3. This is a standalone DB-only stack; the app's primary compose is the repo-root docker-compose.yml.
