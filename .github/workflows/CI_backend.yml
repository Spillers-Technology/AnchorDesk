name: Backend checks

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: arc-org
    # Prisma validate/generate resolves the datasource URL but does not connect.
    env:
      DATABASE_URL: postgresql://anchordesk:anchordesk@127.0.0.1:5432/anchordesk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Validate schema and generate Prisma client
        working-directory: backend
        run: |
          npx prisma validate
          npx prisma generate

      - name: Run Jest tests
        working-directory: backend
        run: npm test

      - name: Build backend
        working-directory: backend
        run: npm run build
